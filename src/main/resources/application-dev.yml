server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/florestal_db
    username: postgres
    password: 12345678
    driver-class-name: org.postgresql.Driver

  hikari:
    minimum-idle: 5
    maximum-pool-size: 20
    idle-timeout: 30000
    max-lifetime: 1800000
    connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: 41UnUh0piXlNYORmNBwiSMWuM3414vnvbn12345678901234567890
  expiration: 8640000

app:
  cors:
    allowed-origin: http://localhost:4200

logging:
  level:
    org.flywaydb: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

