version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-florestal
    restart: always
    environment:
      POSTGRES_DB: florestal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: